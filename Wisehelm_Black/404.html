<!DOCTYPE html>
<html lang="en">
<head>
    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Signal Lost</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 2px var(--gold);
            opacity: 0.5;
            margin: 0;
            line-height: 1;
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0,0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body>
    <!-- BACKGROUND SYSTEM -->
    <div class="bg-system">
        <div class="grid-overlay"></div>
        <div class="beam b1"></div><div class="beam b2"></div><div class="beam b3"></div>
    </div>

    <div class="error-container">
        <div class="badge">System Error</div>
        <h1 class="error-code">404</h1>
        <h2 style="font-size: 2rem; margin-bottom: 1rem; color: var(--white);">Coordinates Not Found</h2>
        <p style="color: var(--gray); max-width: 500px; margin-bottom: 3rem;">
            The page you are looking for has drifted off the radar. It may have been moved, deleted, or never existed in this timeline.
        </p>
        <a href="index.html" class="btn-primary">Return to Command Center</a>
    </div>
</body>
</html>
